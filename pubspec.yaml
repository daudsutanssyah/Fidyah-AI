name: fidyah_ai
description: "Fidyah AI - Kalkulator Fidyah Berbasis AI"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Routing
  go_router: ^15.1.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Typography
  google_fonts: ^6.2.1

  # Animations & Effects
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  animated_text_kit: ^4.2.3

  # Utilities
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  google_generative_ai: ^0.4.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.3
  confetti: ^0.8.0
  device_preview: ^1.3.1
  flutter_islamic_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4


flutter:
  uses-material-design: true
  assets:
    - assets/
